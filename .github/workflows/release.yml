# GitHub Actions workflow to build and release PrintAgent
# Triggers when a version tag is pushed (e.g., v1.0.0)

name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_VERSION: '8.0.x'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version in setup.iss
        shell: pwsh
        run: |
          $content = Get-Content installer/setup.iss -Raw
          $content = $content -replace '#define MyAppVersion ".*"', '#define MyAppVersion "${{ steps.version.outputs.VERSION }}"'
          Set-Content installer/setup.iss $content -NoNewline

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build -c Release --no-restore

      - name: Publish Service
        run: |
          dotnet publish src/PrintAgent.Service/PrintAgent.Service.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish/service

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          iscc /Q installer/setup.iss

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: PrintAgent v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: dist/PrintAgent-Setup-${{ steps.version.outputs.VERSION }}.exe
          body: |
            ## PrintAgent v${{ steps.version.outputs.VERSION }}

            ### Instalador
            - **PrintAgent-Setup-${{ steps.version.outputs.VERSION }}.exe** - Instalador completo para Windows

            ### Requisitos
            - Windows 10/11 (64-bit)
            - No requiere .NET instalado (self-contained)

            ### Instalación
            1. Descargar `PrintAgent-Setup-${{ steps.version.outputs.VERSION }}.exe`
            2. Ejecutar como administrador
            3. Seguir el asistente de instalación

            El servicio se iniciará automáticamente después de la instalación.

            ### Configuración
            Las impresoras se configuran desde la aplicación web (nico).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
